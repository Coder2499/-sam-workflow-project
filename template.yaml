AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FULLY AUTOMATED WORKFLOW - S3 → EventBridge → Step Function → Lambda → SES

Globals:
  Function:
    Timeout: 15
    Runtime: python3.11

Resources:

# ---------------- S3 BUCKET ----------------
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

# ---------------- IAM ROLE (STEP FUNCTION) ----------------
  StepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

# ---------------- LAMBDA 1 (SSM READ) ----------------
  Lambda1:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Lambdas/Lambda1/app.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "*"

# ---------------- LAMBDA 2 (SUCCESS EMAIL) ----------------
  Lambda2:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Lambdas/Lambda2/app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

# ---------------- LAMBDA 3 (FAIL EMAIL) ----------------
  Lambda3:
    Type: AWS::Serverless::Function
    Properties:
      Handler: Lambdas/Lambda3/app.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

# ---------------- STEP FUNCTION ----------------
  MyStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Role: !GetAtt StepFunctionRole.Arn
      DefinitionUri: statemachine/workflow.asl.json
      DefinitionSubstitutions:
        Lambda1Arn: !GetAtt Lambda1.Arn
        Lambda2Arn: !GetAtt Lambda2.Arn
        Lambda3Arn: !GetAtt Lambda3.Arn

# ---------------- EVENTBRIDGE ROLE ----------------
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: "*"

# ---------------- EVENTBRIDGE RULE ----------------
  S3EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref MyBucket
      Targets:
        - Arn: !Ref MyStateMachine
          Id: "StepFunctionTarget"
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              bucket: "$.detail.bucket.name"
              key: "$.detail.object.key"
            InputTemplate: |
              {
                "bucket": <bucket>,
                "key": <key>
              }

Outputs:
  BucketName:
    Value: !Ref MyBucket
  StateMachineArn:
    Value: !Ref MyStateMachine
